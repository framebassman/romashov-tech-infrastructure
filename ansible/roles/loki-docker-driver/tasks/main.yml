---
- name: Install Python requests for community.docker modules
  become: true
  ansible.builtin.apt:
    name:
      - python3-requests
    state: present
    update_cache: yes

- name: Install Loki Docker logging driver plugin
  become: true
  community.docker.docker_plugin:
    plugin_name: "grafana/loki-docker-driver:{{ loki_driver_version }}"
    alias: loki
    state: present
