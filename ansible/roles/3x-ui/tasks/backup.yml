---
- name: Verify R2 credentials are provided
  ansible.builtin.assert:
    that:
      - CLOUDFLARE_R2_API_KEY_ID is defined and CLOUDFLARE_R2_API_KEY_ID | length > 0
      - CLOUDFLARE_R2_API_ACCESS_SECRET is defined and CLOUDFLARE_R2_API_ACCESS_SECRET | length > 0
      - CLOUDFLARE_ACCOUNT_ID is defined and CLOUDFLARE_ACCOUNT_ID | length > 0
    fail_msg: >-
      Missing R2 credentials. Pass via --extra-vars
      CLOUDFLARE_R2_API_KEY_ID / CLOUDFLARE_R2_API_ACCESS_SECRET / CLOUDFLARE_ACCOUNT_ID.
    quiet: true
  delegate_to: localhost
  run_once: true

- name: Render backup compose
  ansible.builtin.template:
    src: docker-compose.backup.yaml.j2
    dest: /home/d.romashov/3x-ui/docker-compose.backup.yaml
    owner: d.romashov
    group: wheel
    mode: "0644"

- name: Start backup container
  community.docker.docker_compose_v2:
    project_src: /home/d.romashov/3x-ui
    files:
      - docker-compose.backup.yaml
    services:
      - backup
    state: present
  environment:
    CLOUDFLARE_R2_API_KEY_ID: "{{ CLOUDFLARE_R2_API_KEY_ID }}"
    CLOUDFLARE_R2_API_ACCESS_SECRET: "{{ CLOUDFLARE_R2_API_ACCESS_SECRET }}"
    CLOUDFLARE_R2_S3_API: "{{ CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com"

- name: Snapshot 3xui DB
  block:
    - name: Stop 3xui_app container
      community.docker.docker_container:
        name: 3xui_app
        state: stopped

    - name: Run offen backup
      ansible.builtin.command: docker exec 3xui_backup backup
      register: backup_result
      changed_when: backup_result.rc == 0
  always:
    - name: Start 3xui_app container
      community.docker.docker_container:
        name: 3xui_app
        state: started

    - name: Remove backup container
      community.docker.docker_compose_v2:
        project_src: /home/d.romashov/3x-ui
        files:
          - docker-compose.backup.yaml
        services:
          - backup
        state: absent
      environment:
        CLOUDFLARE_R2_API_KEY_ID: "{{ CLOUDFLARE_R2_API_KEY_ID }}"
        CLOUDFLARE_R2_API_ACCESS_SECRET: "{{ CLOUDFLARE_R2_API_ACCESS_SECRET }}"
        CLOUDFLARE_R2_S3_API: "{{ CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com"

- name: Show backup output
  ansible.builtin.debug:
    var: backup_result.stdout_lines
