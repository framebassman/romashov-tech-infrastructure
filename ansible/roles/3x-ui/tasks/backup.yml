---
- name: Verify R2 credentials are provided
  ansible.builtin.assert:
    that:
      - CLOUDFLARE_R2_API_KEY_ID is defined and CLOUDFLARE_R2_API_KEY_ID | length > 0
      - CLOUDFLARE_R2_API_ACCESS_SECRET is defined and CLOUDFLARE_R2_API_ACCESS_SECRET | length > 0
      - CLOUDFLARE_ACCOUNT_ID is defined and CLOUDFLARE_ACCOUNT_ID | length > 0
    fail_msg: >-
      Missing R2 credentials. Pass via --extra-vars
      CLOUDFLARE_R2_API_KEY_ID / CLOUDFLARE_R2_API_ACCESS_SECRET / CLOUDFLARE_ACCOUNT_ID.
    quiet: true
  delegate_to: localhost
  run_once: true

- name: Set R2 endpoint and backup archive path
  ansible.builtin.set_fact:
    r2_endpoint: "https://{{ CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com"
    backup_archive: >-
      /tmp/backup-{{ ansible_facts['date_time']['date'] }}T{{ ansible_facts['date_time']['hour'] }}-{{ ansible_facts['date_time']['minute'] }}-{{ ansible_facts['date_time']['second'] }}.tar

- name: Create backup archive and restore app
  block:
    - name: Stop 3xui_app container
      community.docker.docker_container:
        name: 3xui_app
        state: stopped

    - name: Create backup archive
      ansible.builtin.command:
        cmd: tar -cf {{ backup_archive }} -C /var/lib/docker/volumes/3x-ui_3xui_db/_data .
      become_user: root
      changed_when: true
  always:
    - name: Start 3xui_app container
      community.docker.docker_container:
        name: 3xui_app
        state: started

- name: Upload backup archive to R2
  amazon.aws.s3_object:
    mode: put
    bucket: backups
    object: "{{ fqdn }}/{{ backup_archive | basename }}"
    src: "{{ backup_archive }}"
    endpoint_url: "{{ r2_endpoint }}"
    access_key: "{{ CLOUDFLARE_R2_API_KEY_ID }}"
    secret_key: "{{ CLOUDFLARE_R2_API_ACCESS_SECRET }}"
    region: us-east-1
    permission: []

- name: List existing backups in R2
  amazon.aws.s3_object_info:
    bucket_name: backups
    prefix: "{{ fqdn }}/backup-"
    endpoint_url: "{{ r2_endpoint }}"
    access_key: "{{ CLOUDFLARE_R2_API_KEY_ID }}"
    secret_key: "{{ CLOUDFLARE_R2_API_ACCESS_SECRET }}"
    region: us-east-1
  register: existing_backups

- name: Prune old backups, keeping the latest {{ backup_retention_count }}
  amazon.aws.s3_object:
    mode: delobj
    bucket: backups
    object: "{{ item }}"
    endpoint_url: "{{ r2_endpoint }}"
    access_key: "{{ CLOUDFLARE_R2_API_KEY_ID }}"
    secret_key: "{{ CLOUDFLARE_R2_API_ACCESS_SECRET }}"
    region: us-east-1
  loop: "{{ (existing_backups.s3_keys | sort)[:-backup_retention_count] }}"

- name: Remove local backup archive
  ansible.builtin.file:
    path: "{{ backup_archive }}"
    state: absent
  become_user: root
