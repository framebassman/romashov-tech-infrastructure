---
- name: Check x3_ui_fqdn is set for this host
  ansible.builtin.assert:
    that:
      - x3_ui_fqdn is defined
      - (x3_ui_fqdn | string | length) > 0
    fail_msg: "Задайте x3_ui_fqdn для хоста в инвентаре (группа 3x-ui)."

- name: Set system hostname
  ansible.builtin.hostname:
    name: "{{ x3_ui_fqdn }}"
  become_user: root

- name: Render docker-compose.yaml
  ansible.builtin.template:
    src: docker-compose.yaml.j2
    dest: /home/d.romashov/3x-ui/docker-compose.yaml
    owner: d.romashov
    group: wheel
    mode: "0644"

- name: Tear down existing services
  community.docker.docker_compose_v2:
    project_src: /home/d.romashov/3x-ui
    state: absent

- name: Create and start services
  community.docker.docker_compose_v2:
    project_src: /home/d.romashov/3x-ui
  register: output
