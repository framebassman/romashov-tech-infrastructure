---
- name: Render docker-compose.yaml
  ansible.builtin.template:
    src: "docker-compose.{{ direction }}.yaml.j2"
    dest: /home/d.romashov/3x-ui/docker-compose.yaml
    owner: d.romashov
    group: wheel
    mode: "0644"

- name: Tear down existing services
  community.docker.docker_compose_v2:
    project_src: /home/d.romashov/3x-ui
    state: absent

- name: Create and start services
  community.docker.docker_compose_v2:
    project_src: /home/d.romashov/3x-ui
  register: output
