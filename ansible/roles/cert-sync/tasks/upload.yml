---
- name: Verify R2 credentials are provided
  ansible.builtin.assert:
    that:
      - CLOUDFLARE_R2_API_KEY_ID is defined and CLOUDFLARE_R2_API_KEY_ID | length > 0
      - CLOUDFLARE_R2_API_ACCESS_SECRET is defined and CLOUDFLARE_R2_API_ACCESS_SECRET | length > 0
      - CLOUDFLARE_ACCOUNT_ID is defined and CLOUDFLARE_ACCOUNT_ID | length > 0
    fail_msg: >-
      Missing R2 credentials. Pass via --extra-vars
      CLOUDFLARE_R2_API_KEY_ID / CLOUDFLARE_R2_API_ACCESS_SECRET / CLOUDFLARE_ACCOUNT_ID.
    quiet: true
  delegate_to: localhost
  run_once: true

- name: Set R2 endpoint
  ansible.builtin.set_fact:
    r2_endpoint: "https://{{ CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com"

- name: Extract cert and key from acme.json into letsencrypt dir
  ansible.builtin.shell: |
    jq -r '.leresolver.Certificates[] | select(.domain.main=="romashov.tech") | .certificate' \
      {{ project_path }}/services/proxy/certs/acme.json \
    | base64 -d > "{{ project_path }}/services/openconnect/letsencrypt/*.romashov.tech-crt.pem"
    jq -r '.leresolver.Certificates[] | select(.domain.main=="romashov.tech") | .key' \
      {{ project_path }}/services/proxy/certs/acme.json \
    | base64 -d > "{{ project_path }}/services/openconnect/letsencrypt/*.romashov.tech-key.pem"
  changed_when: true
  no_log: true

- name: Upload cert to R2
  amazon.aws.s3_object:
    mode: put
    bucket: vpn-certs
    object: cert.pem
    src: "{{ project_path }}/services/openconnect/letsencrypt/*.romashov.tech-crt.pem"
    endpoint_url: "{{ r2_endpoint }}"
    access_key: "{{ CLOUDFLARE_R2_API_KEY_ID }}"
    secret_key: "{{ CLOUDFLARE_R2_API_ACCESS_SECRET }}"
    region: us-east-1
    permission: []

- name: Upload key to R2
  amazon.aws.s3_object:
    mode: put
    bucket: vpn-certs
    object: key.pem
    src: "{{ project_path }}/services/openconnect/letsencrypt/*.romashov.tech-key.pem"
    endpoint_url: "{{ r2_endpoint }}"
    access_key: "{{ CLOUDFLARE_R2_API_KEY_ID }}"
    secret_key: "{{ CLOUDFLARE_R2_API_ACCESS_SECRET }}"
    region: us-east-1
    permission: []
  no_log: true

- name: Fetch OCSP response and upload to R2
  # iOS Cisco Secure Client calls SecTrustEvaluate with kSecRevocationRequirePositiveResponse
  # and no network access — a stapled OCSP response is the only way to pass revocation checking.
  # Fetched once here (on the upload host) and distributed via R2 to all VPN hosts.
  ansible.builtin.shell: |
    CERT="{{ project_path }}/services/openconnect/letsencrypt/*.romashov.tech-crt.pem"
    OUT="/tmp/vpn-cert-sync-ocsp.der"

    OCSP_URL=$(openssl x509 -noout -ocsp_uri -in "$CERT" 2>/dev/null)
    if [ -z "$OCSP_URL" ]; then
      echo "[cert-sync] no OCSP URI in cert (LE R10+?), writing empty placeholder"
      : > "$OUT"
      exit 0
    fi

    awk '/-----BEGIN CERTIFICATE-----/{c++} c==2{print} /-----END CERTIFICATE-----/ && c==2{exit}' \
      "$CERT" > /tmp/vpn-ocsp-issuer.pem

    if openssl ocsp \
        -issuer /tmp/vpn-ocsp-issuer.pem \
        -cert "$CERT" \
        -url "$OCSP_URL" \
        -respout "$OUT" \
        -no_nonce \
        -timeout 10; then
      echo "[cert-sync] OCSP response fetched from $OCSP_URL"
    else
      echo "[cert-sync] OCSP fetch failed, uploading empty placeholder"
      : > "$OUT"
    fi
    rm -f /tmp/vpn-ocsp-issuer.pem
  changed_when: true

- name: Upload OCSP response to R2
  amazon.aws.s3_object:
    mode: put
    bucket: vpn-certs
    object: ocsp.der
    src: /tmp/vpn-cert-sync-ocsp.der
    endpoint_url: "{{ r2_endpoint }}"
    access_key: "{{ CLOUDFLARE_R2_API_KEY_ID }}"
    secret_key: "{{ CLOUDFLARE_R2_API_ACCESS_SECRET }}"
    region: us-east-1
    permission: []

- name: Remove temp OCSP file
  ansible.builtin.file:
    path: /tmp/vpn-cert-sync-ocsp.der
    state: absent
