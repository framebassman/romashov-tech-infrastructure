---
- name: Set R2 endpoint
  ansible.builtin.set_fact:
    r2_endpoint: "https://{{ CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com"

# Certs are installed OUTSIDE the repo working tree so the deployment role's
# `git reset --hard` can never delete them. Must match the bind-mount source in
# romashov-tech/deploy/docker-compose.vpn.yml (VPN_CERTS_DIR, same default).
- name: Set VPN certs dir
  ansible.builtin.set_fact:
    vpn_certs_dir: "{{ vpn_certs_dir | default('/home/d.romashov/vpn-certs') }}"

- name: Ensure VPN certs dir exists
  ansible.builtin.file:
    path: "{{ vpn_certs_dir }}"
    state: directory
    mode: "0700"

- name: Download cert from R2
  amazon.aws.s3_object:
    mode: get
    bucket: vpn-certs
    object: cert.pem
    dest: /tmp/vpn-cert-sync.crt
    endpoint_url: "{{ r2_endpoint }}"
    access_key: "{{ CLOUDFLARE_R2_API_KEY_ID }}"
    secret_key: "{{ CLOUDFLARE_R2_API_ACCESS_SECRET }}"
    region: us-east-1

- name: Download key from R2
  amazon.aws.s3_object:
    mode: get
    bucket: vpn-certs
    object: key.pem
    dest: /tmp/vpn-cert-sync.key
    endpoint_url: "{{ r2_endpoint }}"
    access_key: "{{ CLOUDFLARE_R2_API_KEY_ID }}"
    secret_key: "{{ CLOUDFLARE_R2_API_ACCESS_SECRET }}"
    region: us-east-1
  no_log: true

# ansible.builtin.copy with remote_src compares checksums — only writes if changed,
# which prevents spurious ocserv reloads on unchanged certs
- name: Install cert (ocserv auto-reloads on file change)
  ansible.builtin.copy:
    src: /tmp/vpn-cert-sync.crt
    dest: "{{ vpn_certs_dir }}/server-cert.pem"
    mode: "0644"
    remote_src: true

- name: Install key
  ansible.builtin.copy:
    src: /tmp/vpn-cert-sync.key
    dest: "{{ vpn_certs_dir }}/server-key.pem"
    mode: "0600"
    remote_src: true
  no_log: true

- name: Remove temp files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/vpn-cert-sync.crt
    - /tmp/vpn-cert-sync.key

- name: Fetch OCSP response for server cert stapling
  # iOS Cisco Secure Client calls SecTrustEvaluate with kSecRevocationRequirePositiveResponse
  # and no network access — a stapled OCSP response in the TLS handshake is the only way
  # to pass revocation checking. ZeroSSL certs include an OCSP URI; LE R10+ certs do not.
  # On any failure we write an empty placeholder so ocserv starts without stapling.
  ansible.builtin.shell: |
    set -e
    CERT="{{ vpn_certs_dir }}/server-cert.pem"
    OUT="{{ vpn_certs_dir }}/ocsp-response.der"

    OCSP_URL=$(openssl x509 -noout -ocsp_uri -in "$CERT" 2>/dev/null)
    if [ -z "$OCSP_URL" ]; then
      echo "[cert-sync] no OCSP URI in cert (LE R10+?), writing empty placeholder"
      : > "$OUT"
      exit 0
    fi

    awk '/-----BEGIN CERTIFICATE-----/{c++} c==2{print} /-----END CERTIFICATE-----/ && c==2{exit}' \
      "$CERT" > /tmp/vpn-ocsp-issuer.pem

    if openssl ocsp \
        -issuer /tmp/vpn-ocsp-issuer.pem \
        -cert "$CERT" \
        -url "$OCSP_URL" \
        -respout "$OUT" \
        -no_nonce \
        -timeout 10; then
      echo "[cert-sync] OCSP response fetched from $OCSP_URL"
    else
      echo "[cert-sync] OCSP fetch failed, writing empty placeholder"
      : > "$OUT"
    fi
    rm -f /tmp/vpn-ocsp-issuer.pem
  changed_when: true
