---
- name: Set R2 endpoint
  ansible.builtin.set_fact:
    r2_endpoint: "https://{{ CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com"

# Certs are installed OUTSIDE the repo working tree so the deployment role's
# `git reset --hard` can never delete them. Must match the bind-mount source in
# romashov-tech/deploy/docker-compose.vpn.yml (VPN_CERTS_DIR, same default).
- name: Set VPN certs dir
  ansible.builtin.set_fact:
    vpn_certs_dir: "{{ vpn_certs_dir | default('/home/d.romashov/vpn-certs') }}"

- name: Ensure VPN certs dir exists
  ansible.builtin.file:
    path: "{{ vpn_certs_dir }}"
    state: directory
    mode: "0700"

- name: Download cert from R2
  amazon.aws.s3_object:
    mode: get
    bucket: vpn-certs
    object: cert.pem
    dest: /tmp/vpn-cert-sync.crt
    endpoint_url: "{{ r2_endpoint }}"
    access_key: "{{ CLOUDFLARE_R2_API_KEY_ID }}"
    secret_key: "{{ CLOUDFLARE_R2_API_ACCESS_SECRET }}"
    region: us-east-1

- name: Download key from R2
  amazon.aws.s3_object:
    mode: get
    bucket: vpn-certs
    object: key.pem
    dest: /tmp/vpn-cert-sync.key
    endpoint_url: "{{ r2_endpoint }}"
    access_key: "{{ CLOUDFLARE_R2_API_KEY_ID }}"
    secret_key: "{{ CLOUDFLARE_R2_API_ACCESS_SECRET }}"
    region: us-east-1
  no_log: true

# ansible.builtin.copy with remote_src compares checksums — only writes if changed,
# which prevents spurious ocserv reloads on unchanged certs
- name: Install cert (ocserv auto-reloads on file change)
  ansible.builtin.copy:
    src: /tmp/vpn-cert-sync.crt
    dest: "{{ vpn_certs_dir }}/server-cert.pem"
    mode: "0644"
    remote_src: true

- name: Install key
  ansible.builtin.copy:
    src: /tmp/vpn-cert-sync.key
    dest: "{{ vpn_certs_dir }}/server-key.pem"
    mode: "0600"
    remote_src: true
  no_log: true

- name: Download OCSP response from R2
  amazon.aws.s3_object:
    mode: get
    bucket: vpn-certs
    object: ocsp.der
    dest: /tmp/vpn-cert-sync.ocsp
    endpoint_url: "{{ r2_endpoint }}"
    access_key: "{{ CLOUDFLARE_R2_API_KEY_ID }}"
    secret_key: "{{ CLOUDFLARE_R2_API_ACCESS_SECRET }}"
    region: us-east-1

- name: Remove temp files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/vpn-cert-sync.crt
    - /tmp/vpn-cert-sync.key

# Docker creates a directory at the mount path if the file doesn't exist on the host
# when the container first starts. Remove it so the copy task can write a file.
- name: Remove ocsp-response.der if Docker created it as a directory
  ansible.builtin.file:
    path: "{{ vpn_certs_dir }}/ocsp-response.der"
    state: absent

- name: Install OCSP response (ocserv auto-reloads on file change)
  ansible.builtin.copy:
    src: /tmp/vpn-cert-sync.ocsp
    dest: "{{ vpn_certs_dir }}/ocsp-response.der"
    mode: "0644"
    remote_src: true

- name: Remove temp OCSP file
  ansible.builtin.file:
    path: /tmp/vpn-cert-sync.ocsp
    state: absent
