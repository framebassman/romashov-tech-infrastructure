---
  - name: Set up ssh key for git
    copy:
      src: ../files/ssh-config
      dest: /home/d.romashov/.ssh/config
      owner: d.romashov
      group: wheel
      mode: 0644
      force: no

  - name: Check if romashov-tech repo exists
    stat:
      path: "{{ project_path }}"
    register: repo_exists_check

  - name: Clone romashov-tech repo
    ansible.builtin.git:
      repo: git@github.com:framebassman/romashov-tech.git
      dest: "{{ project_path }}"
      single_branch: no
      version: master
      accept_hostkey: yes
    when: not repo_exists_check.stat.exists

  - name: Reset all changes
    ansible.builtin.git:
      repo: git@github.com:framebassman/romashov-tech.git
      dest: "{{ project_path }}"
      version: master
      update: yes
      force: yes
      clone: no
      single_branch: no
      accept_hostkey: yes

  - name: Create .cloudflare for fetch-secrets (when token provided)
    ansible.builtin.copy:
      content: "export CLOUDFLARE_API_TOKEN={{ cloudflare_api_token }}\n"
      dest: "{{ project_path }}/.cloudflare"
      owner: d.romashov
      group: wheel
      mode: 0600
    when: cloudflare_api_token is defined and cloudflare_api_token | length > 0
    no_log: true

  - name: Stop Deployment
    shell: "make stop-prod-{{ application }}"
    args:
      chdir: "{{ project_path }}"

  - name: Start Deployment
    shell: "make start-prod-{{ application }}"
    args:
      chdir: "{{ project_path }}"

  - name: Cleanup docker images
    shell: make docker-cleanup -i
    args:
      chdir: "{{ project_path }}"

  - name: Remove unused docker images
    shell: docker image prune --all --force
