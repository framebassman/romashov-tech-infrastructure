---
# Сбрасывает UFW на VPN-нодах в дефолтное состояние (удаляет все правила) и отключает.
# Плюс очистка старых артефактов: vpn-firewall-docker-user service/script.

- hosts: vpn
  become: true
  tasks:
    - name: Reset UFW to default and disable (removes all rules)
      ansible.builtin.command:
        cmd: ufw --force reset
      register: ufw_reset
      changed_when: ufw_reset.rc == 0
      failed_when: false

    - name: Stop and disable vpn-firewall-docker-user service (if present)
      ansible.builtin.systemd:
        name: vpn-firewall-docker-user
        state: stopped
        enabled: false
        daemon_reload: true
      ignore_errors: true

    - name: Remove vpn-firewall-docker-user script (if present)
      ansible.builtin.file:
        path: /usr/local/bin/vpn-firewall-docker-user.sh
        state: absent
      ignore_errors: true

    - name: Remove vpn-firewall-docker-user unit file (if present)
      ansible.builtin.file:
        path: /etc/systemd/system/vpn-firewall-docker-user.service
        state: absent
      ignore_errors: true
