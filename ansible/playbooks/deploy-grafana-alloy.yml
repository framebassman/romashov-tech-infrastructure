---
- hosts: sweden
  become: true
  become_user: d.romashov
  vars:
    application: grafana-alloy
    project_path: "/home/d.romashov/romashov-tech"
  roles:
    - romashov-tech-deployment
  post_tasks:
    - name: Ensure grafana-alloy .env exists (copy from example if missing)
      copy:
        src: "{{ project_path }}/services/grafana-alloy/.env.example"
        dest: "{{ project_path }}/services/grafana-alloy/.env"
        remote_src: yes
        force: no
